<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d2035"/>
      <stop offset="70%" stop-color="#061220"/>
      <stop offset="100%" stop-color="#030b16"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4f0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4f0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4eeeff"/>
      <stop offset="100%" stop-color="#00a8c8"/>
    </linearGradient>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="150" cy="138" r="98" fill="none" stroke="#00c8e8" stroke-width="1.5" opacity="0.35" filter="url(#outerGlow)"/>

  <!-- Background circle -->
  <circle cx="150" cy="138" r="98" fill="url(#bgGrad)" stroke="#1a4a5e" stroke-width="1.5"/>

  <!-- Inner glow -->
  <circle cx="150" cy="138" r="70" fill="url(#glowCenter)"/>

  <g transform="translate(150,138)" filter="url(#glowFilter)">

    <!-- 4 diagonal arms of the star -->
    <!-- Top-right arm -->
    <line x1="0" y1="0" x2="55" y2="-55" stroke="#00d4f0" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Top-left arm -->
    <line x1="0" y1="0" x2="-55" y2="-55" stroke="#00d4f0" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Bottom-right arm -->
    <line x1="0" y1="0" x2="55" y2="55" stroke="#00d4f0" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Bottom-left arm -->
    <line x1="0" y1="0" x2="-55" y2="55" stroke="#00d4f0" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Diamond tips at arm ends -->
    <!-- Top-right -->
    <polygon points="55,-55 60,-48 55,-41 50,-48" fill="#00e5ff" transform="rotate(45,55,-55)"/>
    <!-- Top-left -->
    <polygon points="-55,-55 -50,-48 -55,-41 -60,-48" fill="#00e5ff" transform="rotate(-45,-55,-55)"/>
    <!-- Bottom-right -->
    <polygon points="55,55 60,48 55,41 50,48" fill="#00e5ff" transform="rotate(-45,55,55)"/>
    <!-- Bottom-left -->
    <polygon points="-55,55 -50,48 -55,41 -60,48" fill="#00e5ff" transform="rotate(45,-55,55)"/>

    <!-- Small mid-arm nodes -->
    <circle cx="28" cy="-28" r="2.5" fill="#00d4f0"/>
    <circle cx="-28" cy="-28" r="2.5" fill="#00d4f0"/>
    <circle cx="28" cy="28" r="2.5" fill="#00d4f0"/>
    <circle cx="-28" cy="28" r="2.5" fill="#00d4f0"/>

    <!-- Top and bottom short vertical extensions (to make it look more like original) -->
    <line x1="0" y1="-22" x2="0" y2="-40" stroke="#00d4f0" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="0" y2="40" stroke="#00d4f0" stroke-width="2" stroke-linecap="round"/>
    <!-- Top/bottom diamond tips -->
    <polygon points="0,-40 4,-34 0,-28 -4,-34" fill="#00e5ff"/>
    <polygon points="0,40 4,34 0,28 -4,34" fill="#00e5ff"/>

    <!-- Center ring -->
    <circle cx="0" cy="0" r="22" fill="#061828" stroke="#00c8e0" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>

    <!-- Orbital ellipse -->
    <ellipse cx="0" cy="0" rx="32" ry="12" fill="none" stroke="#00c8e0" stroke-width="1.8" opacity="0.9" transform="rotate(-20)"/>

    <!-- Center M mark -->
    <polyline points="-8,6 -4,-6 0,3 4,-6 8,6" fill="none" stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- URANUS text -->
  <text
    x="150" y="257"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Arial', sans-serif"
    font-weight="900"
    font-size="30"
    letter-spacing="5"
    fill="#cef6ff"
    filter="url(#textGlow)"
  >URANUS</text>

  <!-- TRADES text -->
  <text
    x="150" y="275"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-weight="400"
    font-size="11"
    letter-spacing="7"
    fill="#6ab8cc"
  >TRADES</text>
</svg>
