<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark space background with rounded corners -->
  <rect width="180" height="180" rx="36" fill="#010810"/>

  <!-- Subtle background glow -->
  <circle cx="90" cy="82" r="60" fill="url(#bgGlow)" opacity="0.4"/>

  <!-- Hexagonal border frame -->
  <path d="M90 14 L152 50 L152 122 L90 158 L28 122 L28 50 Z"
        fill="none" stroke="url(#hexGrad)" stroke-width="2.5" opacity="0.55"/>

  <!-- Planet Uranus - teal sphere -->
  <circle cx="90" cy="84" r="30" fill="url(#planetGrad)"/>
  <!-- Planet inner highlight -->
  <circle cx="81" cy="74" r="10" fill="white" opacity="0.08"/>

  <!-- Tilted ring system - Uranus rings are nearly vertical -->
  <!-- Ring 1 (outer) -->
  <ellipse cx="90" cy="84" rx="52" ry="14"
           fill="none" stroke="url(#ringGrad1)" stroke-width="3.5" opacity="0.9"
           transform="rotate(-20 90 84)"/>
  <!-- Ring 2 (mid) -->
  <ellipse cx="90" cy="84" rx="42" ry="10"
           fill="none" stroke="url(#ringGrad2)" stroke-width="2" opacity="0.6"
           transform="rotate(-20 90 84)"/>

  <!-- Ring passes behind planet - clip the front half -->
  <clipPath id="planetClip">
    <circle cx="90" cy="84" r="30"/>
  </clipPath>

  <!-- Trading chart waveform on planet -->
  <polyline points="68,86 75,78 82,88 89,75 96,82 103,73 110,83"
            fill="none" stroke="rgba(168,237,255,0.65)" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"
            clip-path="url(#planetClip)"/>

  <!-- Glow dots at ring tips -->
  <circle cx="49" cy="91" r="2.5" fill="#3DD6F5" opacity="0.9" transform="rotate(-20 90 84)"/>
  <circle cx="131" cy="77" r="2.5" fill="#3DD6F5" opacity="0.9" transform="rotate(-20 90 84)"/>

  <!-- Corner star accents -->
  <circle cx="32"  cy="32"  r="1.5" fill="#3DD6F5" opacity="0.7"/>
  <circle cx="148" cy="36"  r="1"   fill="#a8edff" opacity="0.5"/>
  <circle cx="144" cy="148" r="1.5" fill="#3DD6F5" opacity="0.6"/>
  <circle cx="38"  cy="145" r="1"   fill="#a8edff" opacity="0.5"/>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3DD6F5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#010810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="planetGrad" x1="60" y1="54" x2="120" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5ee9ff"/>
      <stop offset="40%"  stop-color="#3DD6F5"/>
      <stop offset="100%" stop-color="#0d5e80"/>
    </linearGradient>
    <linearGradient id="ringGrad1" x1="38" y1="70" x2="142" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a8edff" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#3DD6F5"/>
      <stop offset="100%" stop-color="#a8edff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="48" y1="74" x2="132" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3DD6F5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3DD6F5" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="28" y1="14" x2="152" y2="158" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a8edff" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#3DD6F5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a8edff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
