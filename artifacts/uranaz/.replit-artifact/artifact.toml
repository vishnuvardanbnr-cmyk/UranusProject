kind = "web"
previewPath = "/"
title = "URANAZ TRADES"
version = "1.0.0"
id = "artifacts/uranaz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22041

[services.development]
run = "pnpm --filter @workspace/uranaz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uranaz", "run", "build" ]
publicDir = "artifacts/uranaz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22041"
BASE_PATH = "/"
